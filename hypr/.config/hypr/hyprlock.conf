general {
    hide_cursor = true
    grace = 5
    ignore_empty_input = true
}

# ── Sfondo: screenshot sfocato ────────────────
background {
    monitor =
    path = screenshot
    blur_passes = 4
    blur_size = 8
    brightness = 0.4
    contrast = 1.0
    vibrancy = 0.2
    vibrancy_darkness = 0.2
}

# ── Messaggio di sistema ──────────────────────
label {
    monitor =
    text = // SYSTEM LOCKED
    color = rgba(10, 189, 198, 0.6)
    font_size = 11
    font_family = JetBrainsMono Nerd Font
    position = 0, 220
    halign = center
    valign = center
}

# ── Orologio ──────────────────────────────────
label {
    monitor =
    text = cmd[update:1000] date +"<b>%H:%M</b>"
    color = rgba(249, 240, 2, 1.0)
    font_size = 96
    font_family = JetBrainsMono Nerd Font
    position = 0, 120
    halign = center
    valign = center
    shadow_passes = 3
    shadow_size = 6
    shadow_color = rgba(249, 240, 2, 0.35)
}

# ── Data ──────────────────────────────────────
label {
    monitor =
    text = cmd[update:60000] date +"%A, %d %B %Y"
    color = rgba(10, 189, 198, 0.85)
    font_size = 16
    font_family = JetBrainsMono Nerd Font
    position = 0, 42
    halign = center
    valign = center
}

# ── Campo password ────────────────────────────
input-field {
    monitor =
    size = 280, 48
    outline_thickness = 2
    dots_size = 0.28
    dots_spacing = 0.2
    dots_center = true
    dots_rounding = -1

    outer_color = rgba(10, 189, 198, 0.6)
    inner_color = rgba(0, 6, 14, 0.85)
    font_color = rgba(200, 208, 224, 1.0)

    fade_on_empty = true
    fade_timeout = 1500
    placeholder_text = <i>  password</i>

    check_color = rgba(249, 240, 2, 1.0)
    fail_color = rgba(255, 0, 60, 1.0)
    fail_text = <b>ACCESS DENIED</b> ($ATTEMPTS)
    fail_timeout = 2500

    rounding = 0
    position = 0, -60
    halign = center
    valign = center
}
