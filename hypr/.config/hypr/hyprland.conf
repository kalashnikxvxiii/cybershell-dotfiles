#################
### AUTOSTART ###
#################

# Autostart necessary processes (like notifications daemons, status bars, etc.)
# Or execute your favorite apps at launch like this:

# hyprpolkitagent manaeged by systemd user service (enabled with --now)
exec-once = hyprpm reload                                                                       # load hyprpm plugin (split-monitor-workspaces)
exec-once = qpwgraph 			                                                                # audio
exec-once = easyeffects			                                                                # easyeffects
exec-once = python ~/.local/share/RazerBatteryTray/src/razer_battery_tray.py 'Razer Basilisk V3 Pro 35K Phantom Green Edition (Wireless)'  # razer battery tray
exec-once = nm-applet --indicator                                                               # network manager tray icon                                                                    # status bar
exec-once = awww-daemon                                                                         # wallpaper daemon (awww)
exec-once = quickshell
exec-once = ~/.config/hypr/scripts/wallpaper-themer.sh                                          # set initial wallpapers
# exec-once = hypridle                                                                          # idle management — disabled (desktop)
exec-once = swaync                                                                              # notification daemon
exec-once = hyprlauncher --daemon                                                               # app launcher (pre-loaded in background)
exec-once = wl-paste --watch cliphist store                                                     # clipboard history daemon
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP    # fix Qt theme in portal

# split-monitor-workspaces — indipendent workspace per monitor (native plugin)
plugin {
    split-monitor-workspaces {
        count = 10
        keep_focused = 1
        enable_notifications = 0
        enable_persistent_workspaces = 0
        enable_wrapping = 1
        monitor_priority = DP-1, HDMI-A-1
    }
}
exec-once = xwaylandvideobridge		                        # Discord screen share
# exec-once = cava			                                # cava - audio visualizer

