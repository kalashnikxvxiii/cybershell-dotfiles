###################
### KEYBINDINGS ###
###################

# See https://wiki.hypr.land/Configuring/Keywords/
$mainMod = SUPER                                        # Sets "Windows" key as main modifier

# Example binds, see https://wiki.hypr.land/Configuring/Binds/ for more
# +++++++++++++++++++ Applications +++++++++++++++++++
bind = $mainMod, Q, exec, $terminal
bind = $mainMod, C, killactive,
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, R, exec, $menu
bind = $mainMod, B, exec, zen-browser
# Cheatsheet (floating window)
bind = $mainMod, slash, exec, kitty --class floating -e less -R ~/.config/hypr/hyprland-keys.txt
bind = $mainMod, F1, exec, kitty --class floating -e less -R ~/.config/hypr/hyprland-keys.txt

# +++++++++++++++++++ Window management +++++++++++++++++++

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Resize active window — tieni premuto per ripetere
binde = $mainMod,       equal, resizeactive,  40  0   # Super + =   → più larga
binde = $mainMod,       minus, resizeactive, -40  0   # Super + -   → più stretta
binde = $mainMod SHIFT, equal, resizeactive,  0   40  # Super + +   → più alta
binde = $mainMod SHIFT, minus, resizeactive,  0  -40  # Super + -   → più bassa

# Move focus with mainMod + arrow keys
bind = $mainMod, left, exec, ~/.config/hypr/scripts/focus-horizontal.sh l
bind = $mainMod, right, exec, ~/.config/hypr/scripts/focus-horizontal.sh r
#bind = $mainMod, up,    movefocus, u
#bind = $mainMod, down,  movefocus, d

# Vertical focus for dwindle and monocle layout 
bind = $mainMod, up,    exec, ~/.config/hypr/scripts/focus-vertical.sh u
bind = $mainMod, down,  exec, ~/.config/hypr/scripts/focus-vertical.sh d

# Cicla posizioni — scorre il focus tra tutte le finestre< del workspace
bind = $mainMod,       Tab, swapnext         # ciclo avanti
bind = $mainMod SHIFT, Tab, swapnext, prev   # ciclo indietro

# Sposta finestra — scambia con la finestra adiacente nella direzione indicata (tiling)
bind = $mainMod CTRL, left,  swapwindow, l
bind = $mainMod CTRL, right, swapwindow, r
bind = $mainMod CTRL, up,    swapwindow, u
bind = $mainMod CTRL, down,  swapwindow, d

# Toggle fullscreen mode
bind = $mainMod, F,       fullscreen, 1        # monocle: occupa tutto il workspace (toggle)

# Toggle pseudo-tile mode
bind = $mainMod, P, pseudo, # dwindle

# Toggle split mode
bind = $mainMod, J, layoutmsg, togglesplit

# Toggle floating mode
bind = $mainMod, V,       togglefloating,

# Sposta finestra floating — tieni premuto per ripetere
binde = $mainMod ALT, left,  moveactive, -20  0
binde = $mainMod ALT, right, moveactive,  20  0
binde = $mainMod ALT, up,    moveactive,  0  -20
binde = $mainMod ALT, down,  moveactive,  0   20

# Sposta finestra su altro monitor
bind = $mainMod SHIFT, comma,  movewindow, mon:l
bind = $mainMod SHIFT, period, movewindow, mon:r

# Minimize
bind = $mainMod, H,             exec, ~/.config/hypr/scripts/minimize.sh minimize
bind = $mainMod SHIFT, H,       exec, ~/.config/hypr/scripts/minimize.sh restore

# +++++++++++++++++++ Utilities +++++++++++++++++++
# Clipboard
bind = $mainMod SHIFT, V,       exec, ~/.config/hypr/scripts/clipboard.sh           # incolla da history
bind = $mainMod CTRL, V,        exec, ~/.config/hypr/scripts/clipboard.sh delete    # elimina singola voce
bind = $mainMod CTRL SHIFT, V,  exec, ~/.config/hypr/scripts/clipboard.sh wipe      # svuota tutto

# Color picker (hyprpicker)
bind = $mainMod, I, exec, hyprpicker -a

# Toggle notification center
bind = $mainMod, N, exec, swaync-client -t

# Toggle cursor zoom
bind = $mainMod ALT, mouse_down, exec, hyprctl keyword cursor:zoom_factor \
    "$(hyprctl getoption cursor:zoom_factor -j | jq '.float + 0.5')"
bind = $mainMod ALT, mouse_up, exec, hyprctl keyword cursor:zoom_factor \
    "$(hyprctl getoption cursor:zoom_factor -j | jq 'if .float - 0.5 < 1.0 then 1.0 else .float - 0.5 end')"

# +++++++++++++++++++ Workspaces +++++++++++++++++++
# Switch workspaces — randomized animation per transition
bind = $mainMod, 1, exec, ~/.config/hypr/scripts/ws-switch.sh goto 1
bind = $mainMod, 2, exec, ~/.config/hypr/scripts/ws-switch.sh goto 2
bind = $mainMod, 3, exec, ~/.config/hypr/scripts/ws-switch.sh goto 3
bind = $mainMod, 4, exec, ~/.config/hypr/scripts/ws-switch.sh goto 4
bind = $mainMod, 5, exec, ~/.config/hypr/scripts/ws-switch.sh goto 5
bind = $mainMod, 6, exec, ~/.config/hypr/scripts/ws-switch.sh goto 6
bind = $mainMod, 7, exec, ~/.config/hypr/scripts/ws-switch.sh goto 7
bind = $mainMod, 8, exec, ~/.config/hypr/scripts/ws-switch.sh goto 8
bind = $mainMod, 9, exec, ~/.config/hypr/scripts/ws-switch.sh goto 9
bind = $mainMod, 0, exec, ~/.config/hypr/scripts/ws-switch.sh goto 10

# Sposta finestra al workspace N sul monitor corrente
bind = $mainMod SHIFT, 1, exec, ~/.config/hypr/scripts/ws-switch.sh move 1
bind = $mainMod SHIFT, 2, exec, ~/.config/hypr/scripts/ws-switch.sh move 2
bind = $mainMod SHIFT, 3, exec, ~/.config/hypr/scripts/ws-switch.sh move 3
bind = $mainMod SHIFT, 4, exec, ~/.config/hypr/scripts/ws-switch.sh move 4
bind = $mainMod SHIFT, 5, exec, ~/.config/hypr/scripts/ws-switch.sh move 5
bind = $mainMod SHIFT, 6, exec, ~/.config/hypr/scripts/ws-switch.sh move 6
bind = $mainMod SHIFT, 7, exec, ~/.config/hypr/scripts/ws-switch.sh move 7
bind = $mainMod SHIFT, 8, exec, ~/.config/hypr/scripts/ws-switch.sh move 8
bind = $mainMod SHIFT, 9, exec, ~/.config/hypr/scripts/ws-switch.sh move 9
bind = $mainMod SHIFT, 0, exec, ~/.config/hypr/scripts/ws-switch.sh move 10

# Scratchpad
bind = $mainMod, S,             togglespecialworkspace, magic
bind = $mainMod SHIFT, S,       movetoworkspace, special:magic
bind = $mainMod CTRL, S,        exec, ~/.config/hypr/scripts/scratchpad.sh pull-one
bind = $mainMod CTRL SHIFT, S,  exec, ~/.config/hypr/scripts/scratchpad.sh pull-all

# Hyprscrolling - navigazione nastro e resize colonne
bind = $mainMod, comma, layoutmsg, move -col
bind = $mainMod, period, layoutmsg, move +col
bind = $mainMod CTRL, comma, layoutmsg, colresize -conf
bind = $mainMod CTRL, period, layoutmsg, colresize +conf

# Scroll workspace — cicla tra i ws del monitor corrente (randomized animation)
bind = $mainMod, mouse_down, exec, ~/.config/hypr/scripts/ws-switch.sh next
bind = $mainMod, mouse_up,   exec, ~/.config/hypr/scripts/ws-switch.sh prev

# +++++++++++++++++++ Screenshot +++++++++++++++++++
bind = , Print, exec, hyprshot -m region                    # seleziona area
bind = $mainMod, Print, exec, hyprshot -m output            # monitor intero
bind = $mainMod SHIFT, Print, exec, hyprshot -m window      # finestra attiva

# Wallpaper
bind = $mainMod,           W, exec, ~/.config/hypr/scripts/wallpaper-themer.sh smart        # cambia in base alla modalita
bind = $mainMod SHIFT,     W, exec, ~/.config/hypr/scripts/wallpaper-themer.sh toggle-mode  # alterna entrambi/indipendente
bind = $mainMod CTRL,      W, exec, ~/.config/hypr/scripts/wallpaper-themer.sh toggle-auto  # toggle auto-change
bind = $mainMod ALT,       W, exec, ~/.config/hypr/scripts/wallpaper-themer.sh toggle-order # toggle casuale/alfabetico
bind = $mainMod SHIFT ALT, W, exec, ~/.config/hypr/scripts/wallpaper-themer.sh toggle-pool  # cicla pool: static/wpe/mixed
bind = $mainMod,           M, exec, ~/.config/hypr/scripts/wallpaper-themer.sh audio-toggle # mute/unmute audio WPE
bind = $mainMod SHIFT,     M, exec, ~/.config/hypr/scripts/wallpaper-themer.sh audio-up     # volume su
bind = $mainMod CTRL,      M, exec, ~/.config/hypr/scripts/wallpaper-themer.sh audio-down   # volume giu
bind = $mainMod SHIFT,     P, exec, ~/.config/quickshell/scripts/wallpaper-picker.sh toggle # wallpaper picker

# +++++++++++++++++++ Multimedia +++++++++++++++++++
# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

# +++++++++++++++++++ Display +++++++++++++++++++
# Blue light filter toggle (hyprsunset)
bind = $mainMod, F8, exec, pgrep hyprsunset && pkill hyprsunset || hyprsunset -t 4500

# Gamemode — toggle animazioni/blur/shadow per gaming
bind = $mainMod, F9, exec, ~/.config/hypr/scripts/gamemode.sh

# Monitor management GUI
bind = $mainMod, F10, exec, nwg-displays

# Screen recorder (wf-recorder)
bind = $mainMod ALT, R, exec, ~/.config/hypr/scripts/recorder.sh

# Window opacity (xglass-style)
bind = CTRL ALT, V, exec, ~/.config/hypr/scripts/opacity.sh toggle   # toggle 100% ↔ 60%
bind = CTRL ALT, X, exec, ~/.config/hypr/scripts/opacity.sh up       # +10%
bind = CTRL ALT, Z, exec, ~/.config/hypr/scripts/opacity.sh down     # -10%

# Brightness control
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

# +++++++++++++++++++ System +++++++++++++++++++
# Lock screen
bind = $mainMod, L, exec, hyprlock
# Power menu
bind = $mainMod SHIFT, E, exec, wlogout -b 3 -c 20 -r 20 -m 200
# Exit Hyprland
bind = $mainMod SHIFT, ESCAPE, exec, command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit

# Wallpaper (vecchio script — sostituito da wallpaper-themer.sh)
#bind = $mainMod, W, exec, ~/.config/hypr/scripts/wallpaper.sh rotate
#bind = $mainMod SHIFT, W, exec, ~/.config/hypr/scripts/wallpaper.sh toggle-sync

##############################
### WINDOWS AND WORKSPACES ###
##############################

# See https://wiki.hypr.land/Configuring/Window-Rules/ for more
# See https://wiki.hypr.land/Configuring/Workspace-Rules/ for workspace rules

# Layout per-workspace (persistono al config reload)
# DP-1 (priority 0): ws 1-10 | HDMI-A-1 (priority 1): ws 11-20
workspace = 1, layout:scrolling
workspace = 2, layout:scrolling
workspace = 11, layout:monocle
workspace = 13, layout:master

# Example windowrules that are useful

windowrule {
    # Ignore maximize requests from all apps. You'll probably like this.
    name = suppress-maximize-events
    match:class = .*

    suppress_event = maximize
}

windowrule {
    # Fix some dragging issues with XWayland
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false

    no_focus = true
}

# Hyprland-run windowrule
windowrule {
    name = move-hyprland-run

    match:class = hyprland-run

    move = 20 monitor_h-120
    float = yes
}

# wlogout — blur layer
layerrule {
    name            = wlogout-blur
    match:namespace = wlogout
    blur            = true
}

layerrule {
    name            = wpe-animation
    match:namespace = linux-wallpaperengine
    animation       = none
}

layerrule {
    name            = wallpaper-picker
    match:namespace = wallpaper-picker
    animation       = popin 80%
}

# ── App floating comuni ────────────────────────────────────────────────────────

windowrule {
    name        = float-pavucontrol
    match:class = ^(pavucontrol)$
    float       = true
    size        = 800 500
    center      = true
}

windowrule {
    name        = float-nm-editor
    match:class = ^(nm-connection-editor)$
    float       = true
    center      = true
}

windowrule {
    name        = float-file-chooser
    match:title = ^(Open File|Save File|Open Folder|Choose Files?|Apri|Salva|Seleziona)(.*)$
    float       = true
    size        = 900 600
    center      = true
}

windowrule {
    name        = float-dialogs
    match:class = ^(xdg-desktop-portal-gtk)$
    float       = true
    center      = true
}

windowrule {
    name        = float-confirm-dialogs
    match:class = .+
    match:title = ^(Confirm|Conferma|Warning|Avviso|Error|Errore|Question|Are you sure.*)$
    float       = true
    center      = true
}

windowrule {
    name        = float-picture-in-picture
    match:title = ^(Picture.in.[Pp]icture)$
    float       = true
    pin         = true
    size        = 640 360
    move        = 100%-660 100%-380
}

windowrule {
    name        = float-calculator
    match:class = ^(gnome-calculator|qalculate-gtk|kcalc)$
    float       = true
    center      = true
}

windowrule {
    name        = float-blueman
    match:class = ^(blueman-manager)$
    float       = true
    size        = 600 500
    center      = true
}

windowrule {
    name        = float-hyprlock-input
    match:class = ^(org.kde.polkit-kde-authentication-agent-1)$
    float       = true
    center      = true
}

# xwaylandvideobridge — invisibile, serve per screen share su app XWayland (Discord ecc.)
windowrule {
    name        = xwayland-video-bridge-fixes
    match:class = xwaylandvideobridge

    no_initial_focus = true
    no_focus         = true
    no_anim          = true
    no_blur          = true
    max_size         = 1 1
    opacity          = 0.0
}

# Steam — forza tiling per la finestra principale, float per le altre
windowrule {
    name        = steam-main
    match:class = ^(steam)$
    match:title = ^(Steam)$
    tile        = true
}

windowrule {
    name        = steam-popups
    match:class = ^(steam)$
    match:title = ^(?!Steam$).*$
    float       = true
    center      = true

}

# Disabilita blur e opacita' per media player
windowrule {
    name        = media-players-opaque
    match:class = ^(mpv|vlc|gimp|stremio-enhanced|stremio)$
    opacity     = override 1.0 override 1.0 override 1.0
    no_blur     = true
}

windowrule {
    name        = browser-opaque-blur
    match:class = ^(zen)$
    opacity     = override 1.0 override 1.0 override 1.0
}

# Eog, geeqie, vimiv, o altri viewer immagini
windowrule {
    name        = image-viewers-opaque
    match:class = ^(eog|geeqie|imv|vimiv|feh)$
    opacity     = override 1.0 override 1.0 override 1.0
    no_blur     = true
}
