### LOOK AND FEEL ###
#####################

# Refer to https://wiki.hypr.land/Configuring/Variables/

# https://wiki.hypr.land/Configuring/Variables/#general
general {
    gaps_in     = 4
    gaps_out    = 12

    border_size = 2

    col.active_border   = rgba(ea00d9ee) rgba(0abdc6ee) 45deg
    col.inactive_border = rgba(1a1a2e88)

    resize_on_border    = true
    allow_tearing       = false
    layout              = dwindle
}

# https://wiki.hypr.land/Configuring/Variables/#decoration
decoration {
    rounding        = 12
    rounding_power  = 2

    active_opacity   = 0.90
    inactive_opacity = 0.95

    shadow {
        enabled      = true
        range        = 12
        render_power = 3
        color        = rgba(ea00d915)
    }

    blur {
        enabled     = true
        size        = 9
        passes      = 3
        vibrancy    = 1
        noise       = 0.03
        xray        = true
        special     = true
        popups      = true
    }
}

# https://wiki.hypr.land/Configuring/Variables/#animations
animations {
    enabled = true

    # ── Curves ─────────────────────────────────────────────────────────────
    #        NAME,             X0,    Y0,     X1,    Y1
    bezier = easeOutExpo,     0.16,  1,      0.3,   1       # scatto rapido → decelerazione
    bezier = easeInOutQuart,  0.77,  0,      0.175, 1       # lento → veloce → lento
    bezier = easeOutBack,     0.34,  1.36,   0.64,  1       # overshoot in avanti
    bezier = easeInBack,      0.36,  0,      0.66, -0.56    # leggero pull-back iniziale
    bezier = overshot,        0.05,  0.9,    0.1,   1.1     # overshoot aggressivo
    bezier = snap,            0.1,   1.0,    0.1,   1.0     # snappissimo
    bezier = linear,          0,     0,      1,     1       # lineare (gradiente rotante)

    # ── Finestre ──────────────────────────────────────────────────────────
    animation = windows,        1,  5,  easeOutBack                        # base
    animation = windowsIn,      1,  6,  snap,            popin             # apertura: ingrandimento
    animation = windowsOut,     1,  4,  linear,          popin             # chiusura: rimpicciolimento
    animation = windowsMove,    1,  5,  easeOutExpo,     slide             # drag/swap: slide ORIZZONTALE

    # ── Fade ──────────────────────────────────────────────────────────────
    animation = fade,           1,  5,  easeOutExpo
    animation = fadeIn,         1,  6,  easeOutExpo
    animation = fadeOut,        1,  4,  easeInOutQuart
    animation = fadeSwitch,     1,  5,  easeOutExpo
    animation = fadeShadow,     1,  5,  easeOutExpo

    # ── Layer (quickshell, swaync, wlogout…) ──────────────────────────────────
    animation = layers,         1,  4,  easeOutExpo
    animation = layersIn,       1,  5,  easeOutExpo,     slide top         # entra dall'ALTO
    animation = layersOut,      1,  3,  easeOutExpo,      slide top         # esce verso l'ALTO
    animation = fadeLayersIn,   1,  4,  easeOutExpo
    animation = fadeLayersOut,  1,  3,  easeInOutQuart

    # ── Workspace ─────────────────────────────────────────────────────────
    # Nessun override per workspacesIn/Out: le workspace rules controllano la direzione
    animation = workspaces,     1,  6,  easeInOutQuart,  slide

    # ── Special workspace (scratchpad) ────────────────────────────────────
    animation = specialWorkspace,     1,  6,  easeOutBack,    slidevert    # base
    animation = specialWorkspaceIn,   1,  6,  easeOutBack,    slidevert    # cade dall'ALTO con bounce
    animation = specialWorkspaceOut,  1,  5,  easeInBack,     slidevert    # risale verso l'ALTO

    # ── Border ────────────────────────────────────────────────────────────
    animation = border,         1,  8,  easeOutExpo
    animation = borderangle,    1,  8,  linear,          loop             # gradiente rotante

    # ── Zoom ──────────────────────────────────────────────────────────────
    animation = zoomFactor,     1,  5,  overshot
}

