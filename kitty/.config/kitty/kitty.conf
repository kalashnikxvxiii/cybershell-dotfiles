# ══════════════════════════════════════════════
#  KITTY — CYBERPUNK 2077 THEME
#  Palette: #f9f002 yellow | #0abdc6 cyan
#           #ea00d9 magenta | #ff003c red
#           #00ff9d green   | #00060e void
# ══════════════════════════════════════════════


# ── Font ──────────────────────────────────────
font_family      JetBrainsMono Nerd Font
bold_font        JetBrainsMono Nerd Font Bold
italic_font      JetBrainsMono Nerd Font Italic
bold_italic_font JetBrainsMono Nerd Font Bold Italic
font_size        13.0


# ── Cursor ────────────────────────────────────
cursor_shape              block
cursor_blink_interval     0.5
cursor_stop_blinking_after 10.0


# ── Scrollback ────────────────────────────────
scrollback_lines 10000


# ── URL ───────────────────────────────────────
url_style single


# ── Finestra ──────────────────────────────────
remember_window_size   yes
initial_window_width   120c
initial_window_height  35c
window_padding_width   10

# Trasparenza — Hyprland applica il blur automaticamente
background_opacity        0.82
dynamic_background_opacity yes


# ── Tab bar ───────────────────────────────────
tab_bar_edge            top
tab_bar_style           powerline
tab_powerline_style     angled
tab_bar_min_tabs        1
tab_title_template      "  {index}: {title} "

active_tab_font_style   bold
inactive_tab_font_style normal


# ── Colori ────────────────────────────────────
include colors.conf


# ── Bell ──────────────────────────────────────
enable_audio_bell     no
visual_bell_duration  0.0


# ── Misc ──────────────────────────────────────
shell_integration enabled
term              xterm-256color


# ── Keybindings ───────────────────────────────

# Tab
map ctrl+t            new_tab
map ctrl+w            close_tab
map ctrl+tab          next_tab
map ctrl+shift+tab    previous_tab
map ctrl+shift+t      set_tab_title

# Finestre interne (split)
map ctrl+shift+enter  new_window
map ctrl+shift+w      close_window
map ctrl+shift+right  next_window
map ctrl+shift+left   previous_window

# Font size
map ctrl+equal        change_font_size all +1.0
map ctrl+minus        change_font_size all -1.0
map ctrl+0            change_font_size all 0

# Opacità al volo
map ctrl+shift+equal  set_background_opacity +0.05
map ctrl+shift+minus  set_background_opacity -0.05

# Copia / Incolla
map ctrl+shift+c      copy_to_clipboard
map ctrl+shift+v      paste_from_clipboard
